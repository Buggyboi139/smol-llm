run_name: smol_25m
seed: 1337

data:
  train_bin: data/processed/train.bin
  val_bin: data/processed/val.bin
  tokenizer: data/tokenizer/tokenizer.json

model:
  vocab_size: 16000
  block_size: 512
  n_layer: 6
  n_head: 8
  n_embd: 512
  dropout: 0.1

training:
  batch_size: 32
  max_steps: 10000
  eval_interval: 250
  eval_iters: 50
  save_interval: 1000
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 200
  weight_decay: 0.1
  grad_clip: 1.0
  compile: false
  device: auto
  dtype: auto

output:
  checkpoint_dir: checkpoints
  log_file: logs/train_log.jsonl
