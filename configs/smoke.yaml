run_name: smoke
seed: 1337

data:
  train_bin: data/processed/train.bin
  val_bin: data/processed/val.bin
  tokenizer: data/tokenizer/tokenizer.json
  token_dtype: auto

model:
  vocab_size: 16000
  block_size: 128
  n_layer: 2
  n_head: 4
  n_embd: 128
  dropout: 0.1

training:
  batch_size: 16
  max_steps: 200
  eval_interval: 25
  eval_iters: 10
  save_interval: 100
  learning_rate: 0.0005
  min_learning_rate: 0.00005
  warmup_steps: 10
  weight_decay: 0.1
  grad_clip: 1.0
  compile: false
  device: auto
  dtype: auto

output:
  checkpoint_dir: checkpoints
  log_file: logs/train_log.jsonl
